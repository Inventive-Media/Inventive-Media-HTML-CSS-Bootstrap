<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 3 - Bootstrap5 Essentials</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
  </head>

  <body>
    <div class="container">
      <h1>Bootstrap Sanbox</h1>
      <hr />
      <hr />
      <p class="fw-bold">Buttons</p>
      <!-- 
      BUTTON SIZES
      Bootstrap provides size classes: btn-sm (small), btn-md (medium, default), btn-lg (large).
      The "btn" base class is always required. You can use <a> or <button> elements.
      Adding "btn btn-primary" turns any element into a styled Bootstrap button.
    -->
      <p>Button sizes</p>
      <a href="./index.html" class="btn btn-primary btn-sm"
        >Link button small</a
      >
      <a href="./index.html" class="btn btn-primary btn-md"
        >Link button medium</a
      >
      <a href="./index.html" class="btn btn-primary btn-lg"
        >Link button large</a
      >
      <hr />
      <!-- 
      BUTTON COLORS
      Bootstrap has theme colors: primary (blue), secondary (gray), danger (red),
      warning (yellow), info (light blue), success (green).
      Use "btn btn-{color}" to apply a solid colored button.
    -->
      <p>Button colors</p>
      <button class="btn btn-primary btn-sm">Button</button>
      <button class="btn btn-secondary btn-sm">Button</button>
      <button class="btn btn-danger btn-sm">Button</button>
      <button class="btn btn-warning btn-sm">Button</button>
      <button class="btn btn-info btn-sm">Button</button>
      <button class="btn btn-success btn-sm">Button</button>

      <hr />
      <!-- 
      OUTLINED BUTTONS
      Use "btn-outline-{color}" instead of "btn-{color}" for bordered buttons
      with a transparent background. They fill with color on hover.
    -->
      <p>Outlined buttons</p>
      <button class="btn btn-outline-primary btn-sm">Button</button>
      <button class="btn btn-outline-secondary btn-sm">Button</button>
      <button class="btn btn-outline-danger btn-sm">Button</button>
      <button class="btn btn-outline-warning btn-sm">Button</button>
      <button class="btn btn-outline-info btn-sm">Button</button>
      <button class="btn btn-outline-success btn-sm">Button</button>

      <hr />
      <!-- 
      DISABLED BUTTONS
      Adding the "disabled" HTML attribute makes a button unclickable
      and gives it a faded appearance. Works with both solid and outline styles.
    -->
      <p>Disabled buttons</p>
      <button class="btn btn-primary btn-sm" disabled>Button</button>
      <button class="btn btn-secondary btn-sm" disabled>Button</button>
      <button class="btn btn-danger btn-sm" disabled>Button</button>
      <button class="btn btn-warning btn-sm" disabled>Button</button>
      <button class="btn btn-info btn-sm" disabled>Button</button>
      <button class="btn btn-success btn-sm" disabled>Button</button>
      <button class="btn btn-outline-success btn-sm" disabled>Button</button>

      <hr />
      <p>Button groups</p>
      <div class="btn-group" role="group" aria-label="Basic example">
        <button class="btn btn-primary btn-sm">Left</button>
        <button class="btn btn-primary btn-sm">Middle</button>
        <button class="btn btn-primary btn-sm">Right</button>
      </div>
      <hr />
      <p>With style</p>
      <div class="btn-group" role="group" aria-label="Basic example">
        <button class="btn btn-primary btn-sm">Left</button>
        <button class="btn btn-danger btn-sm">Middle</button>
        <button class="btn btn-warning btn-sm">Right</button>
      </div>
      <hr />
      <p>Outlined</p>
      <div
        class="btn-group btn-group-sm"
        role="group"
        aria-label="Basic outlined example"
      >
        <button type="button" class="btn btn-outline-primary">Middle</button>
        <button type="button" class="btn btn-outline-primary">Left</button>
        <button type="button" class="btn btn-outline-primary">Right</button>
      </div>
      <hr />
      <p>Outlined toggle</p>
      <div
        class="btn-group btn-group-sm"
        role="group"
        aria-label="Basic radio toggle button group"
      >
        <input
          type="radio"
          class="btn-check"
          name="btnradio"
          id="btnradio1"
          autocomplete="off"
          checked
        />
        <label class="btn btn-outline-primary" for="btnradio1">Radio 1</label>

        <input
          type="radio"
          class="btn-check"
          name="btnradio"
          id="btnradio2"
          autocomplete="off"
        />
        <label class="btn btn-outline-primary" for="btnradio2">Radio 2</label>

        <input
          type="radio"
          class="btn-check"
          name="btnradio"
          id="btnradio3"
          autocomplete="off"
        />
        <label class="btn btn-outline-primary" for="btnradio3">Radio 3</label>
      </div>

      <hr />
      <p>Vertical Alignment</p>
      <div
        class="btn-group-vertical btn-group-sm"
        role="group"
        aria-label="vertical button group"
      >
        <button type="button" class="btn btn-primary">Button</button>
        <button type="button" class="btn btn-primary">Button</button>
        <button type="button" class="btn btn-primary">Button</button>
        <button type="button" class="btn btn-primary">Button</button>
      </div>

      <hr />
      <p>Vertical outlined toggle</p>
      <div
        class="btn-group-vertical btn-group-sm"
        role="group"
        aria-label="Vertical radio toggle button group"
      >
        <input
          type="radio"
          class="btn-check"
          name="vbtn-radio"
          id="vbtn-radio1"
          autocomplete="off"
          checked
        />
        <label class="btn btn-outline-danger" for="vbtn-radio1">Radio 1</label>
        <input
          type="radio"
          class="btn-check"
          name="vbtn-radio"
          id="vbtn-radio2"
          autocomplete="off"
        />
        <label class="btn btn-outline-danger" for="vbtn-radio2">Radio 2</label>
        <input
          type="radio"
          class="btn-check"
          name="vbtn-radio"
          id="vbtn-radio3"
          autocomplete="off"
        />
        <label class="btn btn-outline-danger" for="vbtn-radio3">Radio 3</label>
      </div>
    </div>
    <script src="./js/bootstrap.bundle.min.js"></script>
  </body>
</html>
