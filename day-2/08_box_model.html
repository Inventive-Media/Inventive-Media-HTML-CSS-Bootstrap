<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 2 - CSS Essentials</title>
  <link rel="stylesheet" href="./css/08_box_model.css">
</head>
<body>
  <hr>
  <h1>Box Model in CSS</h1>
  <hr>

  <!-- start here -->
  <!-- padding -->
  <h2>Padding space</h2>
  <p class="space-padding">I'm text with padding</p>

  <hr>
  <hr>
  <!-- margin -->
  <h2>Margin space</h2>
  <p class="space-margin">I'm text with margin</p>

  <hr>
  <hr>
  <!-- borders -->
  <h2>Borders</h2>
  <div class="box border">Border solid</div>
  <div class="box border-color">Border color</div>
  <div class="box border-dotted">Border dotted</div>
  <div class="box border-dashed">Border dashed</div>
  <div class="box border-radius">Border radius</div>

  <!-- explain diff of borderbox and content box -->
  <!-- content box -->
  <div class="squared content_box">
    content box
  </div>

  <!-- border box -->
  <div class="squared border_box">
    border box
  </div>

</body>
</html>
