<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 2 - CSS Essentials</title>
  <link rel="stylesheet" href="./css/11_positioning.css">
</head>
<body>
  <hr>
  <h1>Positioning in CSS</h1>
  <hr>

  <!-- start here -->
  <!-- static -->
  <h2>Static position</h2>
  <div class="box">
    <div class="text-box">I'm static</div>
  </div>

  <hr>
  <hr>
  <!-- relative -->
  <h2>Relative position</h2>
  <div class="box">
    <p class="text-box p-relative">I'm relative</p>
  </div>

  <hr>
  <hr>
  <!-- absolute -->
  <h2>Absolute position</h2>
  <div class="box">
    <p class="text-box p-relative">I'm relative</p>
    <div class="text-box p-absolute">I'm absolute</div>
  </div>

  <hr>
  <hr>
  <!-- fixed -->
  <h2>Fixed position</h2>
  <div class="box">
    <p class="text-box p-fixed">I'm fixed</p>
  </div>

  <hr>
  <hr>
  <!-- sticky -->
  <div class="box">
    <p class="text-box p-sticky">I'm sticky</p>
  </div>

  <!-- <div class="text-box p-sticky">hello there</div> -->

  <div class="spacer"></div>
  <div class="spacer"></div>
</body>
</html>
