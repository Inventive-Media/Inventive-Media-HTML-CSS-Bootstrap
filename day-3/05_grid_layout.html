<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 3 - Bootstrap5 Essentials</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body>
  <div class="container">
    <h1>Grid layout</h1>
    <hr>
    <hr>
    <!-- start here -->
    <!-- basic grid -->
    <p class="fw-bold">Basic Grid</p>
    <div class="row mb-4">
      <div class="col">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
    </div>

    <!-- basic grid -->
    <p class="fw-bold">Column width</p>
    <div class="row mb-4">
      <div class="col-6">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
    </div>

    <!-- responsive col width -->
    <p class="fw-bold">Responsive Column Width</p>
    <div class="row mb-4">
      <div class="col-12 col-sm-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-12 col-sm-3">
        <div class="p-3 bg-danger text-white">Col 2</div>
      </div>
      <div class="col-12 col-sm-6">
        <div class="p-3 bg-success text-white">Col 3</div>
      </div>
    </div>

    <!-- Justify columns -->
    <p class="fw-bold">Justify columns</p>
    <div class="row justify-content-end mb-3">
      <div class="col-md-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-warning text-white">Col 2</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-info text-white">Col 3</div>
      </div>
    </div>
    <div class="row justify-content-center mb-3">
      <div class="col-md-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-warning text-white">Col 2</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-info text-white">Col 3</div>
      </div>
    </div>
    <div class="row justify-content-start mb-3">
      <div class="col-md-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-warning text-white">Col 2</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-info text-white">Col 3</div>
      </div>
    </div>
    <div class="row justify-content-between mb-3">
      <div class="col-md-3">
        <div class="p-3 bg-primary text-white">Col 1</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-warning text-white">Col 2</div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-info text-white">Col 3</div>
      </div>
    </div>
  </div>
</body>
</html>
